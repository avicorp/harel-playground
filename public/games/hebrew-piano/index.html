<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<title>פסנתר קסום</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  background: #0a0008;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  user-select: none;
  -webkit-user-select: none;
  direction: rtl;
}
canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* Overlay screens */
.screen-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  background: rgba(10, 0, 8, 0.94);
}
.screen-overlay.active { display: flex; }

/* Menu screen */
#menu-screen { gap: 30px; }
.menu-title {
  font-size: 64px;
  font-weight: bold;
  background: linear-gradient(135deg, #ff6a00, #ee0979, #ff6a00, #ffd200);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleShimmer 3s ease-in-out infinite;
}
@keyframes titleShimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.menu-emoji {
  font-size: 80px;
  animation: bounce 1.5s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}
.menu-subtitle {
  font-size: 22px;
  color: #c09070;
}

/* Buttons */
.btn {
  padding: 16px 48px;
  font-size: 24px;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  font-family: inherit;
}
.btn:hover { transform: scale(1.07); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg, #ff6a00, #ee0979);
  color: white;
  box-shadow: 0 4px 24px rgba(255, 106, 0, 0.5);
}
.btn-secondary {
  background: linear-gradient(135deg, #e8a040, #d4781e);
  color: white;
  box-shadow: 0 4px 20px rgba(232, 160, 64, 0.4);
}
.btn-small {
  padding: 12px 32px;
  font-size: 18px;
}

/* Level select */
#level-select { gap: 20px; }
.level-title {
  font-size: 40px;
  color: #ffd6a0;
  margin-bottom: 10px;
}
.levels-container {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.level-card {
  background: rgba(40, 15, 10, 0.9);
  border: 3px solid rgba(255, 150, 50, 0.2);
  border-radius: 20px;
  padding: 24px 32px;
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
  width: 260px;
  text-align: center;
}
.level-card:hover {
  transform: scale(1.05);
  border-color: #ff6a00;
}
.level-card h3 {
  font-size: 26px;
  color: #ffd6a0;
  margin-bottom: 8px;
}
.level-card p {
  font-size: 16px;
  color: #c09070;
  margin-bottom: 12px;
}
.key-preview {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 10px;
}
.key-preview-item {
  width: 32px; height: 40px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: white; font-weight: bold;
}

/* Song select */
.song-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
  max-height: 50vh;
  overflow-y: auto;
  padding: 0 10px;
}
.song-btn {
  padding: 10px 20px;
  font-size: 18px;
  background: rgba(255, 150, 50, 0.08);
  border: 2px solid rgba(255, 150, 50, 0.2);
  border-radius: 12px;
  color: #ffd6a0;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  font-family: inherit;
}
.song-btn:hover {
  background: rgba(255, 106, 0, 0.3);
  border-color: #ff6a00;
}

/* Speed selector */
.speed-selector {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin: 10px 0;
  padding: 16px 24px;
  background: rgba(40, 15, 10, 0.7);
  border: 2px solid rgba(255, 150, 50, 0.2);
  border-radius: 16px;
}
.speed-label {
  font-size: 18px;
  color: #ffd6a0;
  font-weight: bold;
}
.speed-options {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.speed-opt {
  padding: 8px 20px;
  font-size: 16px;
  background: rgba(255, 150, 50, 0.1);
  border: 2px solid rgba(255, 150, 50, 0.25);
  border-radius: 10px;
  color: #c09070;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.speed-opt:hover {
  background: rgba(255, 106, 0, 0.25);
  border-color: #ff6a00;
}
.speed-opt.active {
  background: rgba(255, 106, 0, 0.4);
  border-color: #ff6a00;
  color: #ffd6a0;
}
.strip-toggle {
  display: flex;

  gap: 10px;
  color: #c09070;
  font-size: 16px;
  cursor: pointer;
}
.strip-toggle input {

/* Results screen */
#results-screen { gap: 20px; }
.results-title {

  color: #ffd6a0;

.stars-container {

.star { opacity: 0.2; transition: opacity 0.5s, transform 0.5s; }
.star.earned { opacity: 1; transform: scale(1.2); }

  color: #c09070;

/* Pause overlay */

/* Song select screen */
#song-select { gap: 20px; }
.song-select-title {

  color: #ffd6a0;

/* HUD */
#hud {

  top: 8px; left: 16px; right: 16px;

  justify-content: space-between;
  align-items: center;
  z-index: 5;
  pointer-events: none;

  color: #ffd6a0;
  font-weight: bold;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7);

.hud-combo {

  color: #ffd200;

.hud-combo.pop { transform: scale(1.4); }

/* Countdown */
.countdown {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 120px;
  font-weight: bold;
  color: #ffd200;
  text-shadow: 0 0 40px rgba(255, 210, 0, 0.6);
  z-index: 15;
  display: none;
  animation: countPop 0.8s ease-out;
}
.countdown.active { display: block; }
@keyframes countPop {
  0% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

// AUDIO MANAGER

const Audio = {
  ctx: null,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },
  playNote(freq, duration) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    // Harmonic for richness
    const osc2 = this.ctx.createOscillator();
    const gain2 = this.ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2;
    gain2.gain.setValueAtTime(0, t);
    gain2.gain.linearRampToValueAtTime(0.08, t + 0.01);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc2.connect(gain2).connect(this.ctx.destination);
    osc2.start(t); osc2.stop(t + duration);

    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.01);
    gain.gain.setValueAtTime(0.3, t + Math.max(0.02, duration - 0.1));
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t); osc.stop(t + duration);
  },
  playHit() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.08);
  },
  playMiss() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = 120;
    gain.gain.setValueAtTime(0.12, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t); osc.stop(t + 0.15);
  },
  playLevelComplete() {
    if (!this.ctx) return;
    const freqs = [261.63, 329.63, 392, 523.25];
    freqs.forEach((f, i) => {
      setTimeout(() => this.playNote(f, 0.3), i * 150);
    });
  }
};

// ============================================================
// CONSTANTS
// ============================================================
const PERFECT_WINDOW = 28;
const GOOD_WINDOW = 55;
const SHORT_NOTE_HEIGHT = 36;
const LONG_NOTE_BASE = 90;
const LONG_NOTE_EXTRA = 50;
const MIN_SPEED = 1.2;
const MAX_SPEED = 6.0;
const BEATS_PER_FRAME_L1 = 0.025;
const BEATS_PER_FRAME_L2 = 0.028;

// Speed presets
const SPEED_PRESETS = {
  slow: { base1: 1.4, base2: 1.6, label: 'איטי' },
  normal: { base1: 2.0, base2: 2.2, label: 'רגיל' },
  fast: { base1: 2.8, base2: 3.0, label: 'מהיר' },
  extreme: { base1: 3.6, base2: 3.8, label: 'קיצוני' },
};

// Dynamic speed config
const SPEED_EVAL_WINDOW = 20;    // evaluate last N notes
const SPEED_UP_THRESHOLD = 0.85; // hit rate above this => speed up
const SPEED_DOWN_THRESHOLD = 0.5; // hit rate below this => slow down
const SPEED_ADJUST_AMOUNT = 0.06;

// ============================================================
// GAME STATE
// ============================================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let W, H, hitZoneY, pianoKeyH;

const state = {
  screen: 'menu',
  level: 1,
  songIndex: 0,
  lanes: LEVEL1_LANES,
  song: null,
  score: 0,
  combo: 0,
  maxCombo: 0,
  totalNotes: 0,
  hitNotes: 0,
  perfectHits: 0,
  speed: 2.0,
  baseSpeed: 2.0,
  speedPreset: 'normal',
  longStrips: false,
  notes: [],
  particles: [],
  feedbacks: [],
  keysDown: new Set(),
  activeHolds: new Map(),
  songBeat: 0,
  songNoteIdx: 0,
  songDone: false,
  paused: false,
  countdownVal: 0,
  countdownTimer: 0,
  stars: [],
  recentResults: [], // track recent hit/miss for dynamic speed
  laneGlowTimers: {}, // track per-lane glow for strip highlight
};

// ============================================================
// RESIZE
// ============================================================
function resize() {
  canvas.width = W = window.innerWidth;
  canvas.height = H = window.innerHeight;
  pianoKeyH = Math.min(120, H * 0.15);
  hitZoneY = H - pianoKeyH - 10;
  // Regenerate background stars
  state.stars = [];
  for (let i = 0; i < 80; i++) {
    state.stars.push({
      x: Math.random() * W,
      y: Math.random() * (H - pianoKeyH - 50),
      r: Math.random() * 1.5 + 0.5,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005
    });
  }
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  state.screen = name;
  document.querySelectorAll('.screen-overlay').forEach(el => el.classList.remove('active'));
  const hud = document.getElementById('hud');
  hud.classList.remove('active');

  if (name === 'menu') document.getElementById('menu-screen').classList.add('active');
  else if (name === 'levelSelect') document.getElementById('level-select').classList.add('active');
  else if (name === 'songSelect') document.getElementById('song-select').classList.add('active');
  else if (name === 'paused') document.getElementById('pause-overlay').classList.add('active');
  else if (name === 'results') document.getElementById('results-screen').classList.add('active');
  else if (name === 'playing') hud.classList.add('active');
}

// Build key previews
function buildPreviews() {
  const p1 = document.getElementById('preview-level1');
  const p2 = document.getElementById('preview-level2');
  p1.innerHTML = '';
  p2.innerHTML = '';
  LEVEL1_LANES.forEach(l => {
    const d = document.createElement('div');
    d.className = 'key-preview-item';
    d.style.background = l.color;
    d.textContent = l.hebrew;
    p1.appendChild(d);
  });
  LEVEL2_LANES.forEach(l => {
    const d = document.createElement('div');
    d.className = 'key-preview-item';
    d.style.background = l.color;
    d.textContent = l.hebrew;
    p2.appendChild(d);
  });
}
buildPreviews();

// Speed selector
document.querySelectorAll('.speed-opt').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.speedPreset = btn.dataset.speed;
  });
});

function showSongSelect(level) {
  state.level = level;
  state.lanes = level === 1 ? LEVEL1_LANES : LEVEL2_LANES;
  const songs = level === 1 ? SONGS.level1 : SONGS.level2;
  const list = document.getElementById('song-list');
  list.innerHTML = '';
  songs.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'song-btn';
    btn.innerHTML = `<strong>${s.name}</strong><br><small>${s.desc}</small>`;
    btn.onclick = () => startSong(i);
    list.appendChild(btn);
  });
  showScreen('songSelect');
}

function startSong(songIndex) {
  Audio.init();
  state.songIndex = songIndex;
  const songs = state.level === 1 ? SONGS.level1 : SONGS.level2;
  state.song = songs[songIndex].data;
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.totalNotes = state.song.length;
  state.hitNotes = 0;
  state.perfectHits = 0;
  state.recentResults = [];
  state.laneGlowTimers = {};

  // Apply speed preset
  const preset = SPEED_PRESETS[state.speedPreset] || SPEED_PRESETS.normal;
  state.baseSpeed = state.level === 1 ? preset.base1 : preset.base2;
  state.speed = state.baseSpeed;

  // Check long strips toggle
  state.longStrips = document.getElementById('long-strips-toggle').checked;

  state.notes = [];
  state.particles = [];
  state.feedbacks = [];
  state.keysDown.clear();
  state.activeHolds.clear();
  state.songBeat = 0;
  state.songNoteIdx = 0;
  state.songDone = false;
  state.paused = false;

  // Countdown
  state.countdownVal = 3;
  state.countdownTimer = 0;
  showScreen('playing');
  updateHUD();
}

// BUTTON HANDLERS

document.getElementById('btn-start').onclick = () => showScreen('levelSelect');
document.getElementById('card-level1').onclick = () => showSongSelect(1);
document.getElementById('card-level2').onclick = () => showSongSelect(2);
document.getElementById('btn-back-menu').onclick = () => showScreen('menu');

document.getElementById('btn-quit').onclick = () => showScreen('menu');

// ============================================================
// HUD
// ============================================================
function updateHUD() {
  document.getElementById('hud-score').textContent = `ניקוד: ${state.score}`;
  const comboEl = document.getElementById('hud-combo');
  if (state.combo > 1) {
    comboEl.textContent = `🔥 קומבו x${state.combo}`;
    comboEl.classList.add('pop');
    setTimeout(() => comboEl.classList.remove('pop'), 100);
  } else {
    comboEl.textContent = '';
  }
  const speedLvl = Math.round((state.speed - MIN_SPEED) / (MAX_SPEED - MIN_SPEED) * 10) + 1;
  document.getElementById('hud-speed').textContent = `מהירות: ${Math.min(speedLvl, 10)}`;
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      r: Math.random() * 4 + 2,
      color,
      alpha: 1,
      decay: Math.random() * 0.02 + 0.015
    });
  }
}

// Fire-like particles for perfect hits
function spawnFireParticles(x, y, count) {
  const fireColors = ['#ff6a00', '#ff9800', '#ffd200', '#ff3d00', '#ffab00'];
  for (let i = 0; i < count; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
    const speed = Math.random() * 6 + 3;
    state.particles.push({
      x: x + (Math.random() - 0.5) * 30,
      y,
      vx: Math.cos(angle) * speed * 0.5,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 5 + 2,
      color: fireColors[Math.floor(Math.random() * fireColors.length)],
      alpha: 1,
      decay: Math.random() * 0.02 + 0.012
    });
  }
}

function spawnFeedback(x, y, text, color) {
  state.feedbacks.push({ x, y, text, color, alpha: 1, scale: 1.5, life: 50 });
}

// ============================================================
// DYNAMIC SPEED BASED ON HIT RATE
// ============================================================
function evaluateAndAdjustSpeed() {
  if (state.recentResults.length < SPEED_EVAL_WINDOW) return;

  const window = state.recentResults.slice(-SPEED_EVAL_WINDOW);
  const hits = window.filter(r => r).length;
  const hitRate = hits / window.length;

  if (hitRate >= SPEED_UP_THRESHOLD) {
    state.speed = Math.min(state.speed + SPEED_ADJUST_AMOUNT, MAX_SPEED);
  } else if (hitRate <= SPEED_DOWN_THRESHOLD) {
    state.speed = Math.max(state.speed - SPEED_ADJUST_AMOUNT * 2, MIN_SPEED);
  }
}

// ============================================================
// HIT DETECTION - Fixed timing: check strip top (start) reaching hit zone
// ============================================================
function tryHitLane(laneIdx) {
  const lane = state.lanes[laneIdx];
  if (!lane) return;

  // Play the note sound
  const dur = 0.3;
  Audio.playNote(lane.freq, dur);

  // Set glow timer for this lane (for strip highlight)
  state.laneGlowTimers[laneIdx] = 12;

  // Find closest unhit note in this lane near hit zone
  // For timing: the TOP of the strip should be at or past the hit zone line
  // A hit is valid when the strip overlaps the hit zone area
  let best = null;
  let bestDist = Infinity;
  for (const n of state.notes) {
    if (n.lane !== laneIdx || n.hit) continue;
    // The strip spans from n.y (top) to n.y + n.height (bottom)
    // Hit zone is at hitZoneY
    // Valid hit: top of strip is near or past hitZoneY, and bottom hasn't gone too far past
    const topDist = Math.abs(n.y - hitZoneY);
    // Also allow hitting when the strip is overlapping the hit zone
    const stripTop = n.y;
    const stripBottom = n.y + n.height;
    const overlaps = stripTop <= hitZoneY + GOOD_WINDOW && stripBottom >= hitZoneY - GOOD_WINDOW;
    if (overlaps && topDist < bestDist) {
      bestDist = topDist;
      best = n;
    }
  }

  const laneW = W / state.lanes.length;
  const laneX = laneIdx * laneW + laneW / 2;

  if (best && bestDist <= GOOD_WINDOW) {
    best.hit = true;
    best.hitTime = frameCount;
    state.hitNotes++;
    state.recentResults.push(true);

    if (bestDist <= PERFECT_WINDOW) {
      state.perfectHits++;
      state.score += 100 * Math.max(1, Math.floor(state.combo / 5));
      state.combo++;
      spawnFireParticles(laneX, hitZoneY, 22);
      spawnFeedback(laneX, hitZoneY - 40, '!מושלם', '#ffd200');
      Audio.playHit();
    } else {
      state.score += 50 * Math.max(1, Math.floor(state.combo / 5));
      state.combo++;
      spawnParticles(laneX, hitZoneY, lane.color, 12);
      spawnFeedback(laneX, hitZoneY - 40, '!טוב', '#ffab00');
    }

    if (state.combo > state.maxCombo) state.maxCombo = state.combo;

    // Long note: start hold tracking
    if (best.duration > 1) {
      state.activeHolds.set(best.id, { noteId: best.id, lane: laneIdx, startY: best.y, held: true });
    }

    // Evaluate speed based on hit rate
    evaluateAndAdjustSpeed();
  }

  updateHUD();
}

function releaseLane(laneIdx) {
  for (const [id, hold] of state.activeHolds) {
    if (hold.lane === laneIdx) {
      hold.held = false;
      state.activeHolds.delete(id);
    }
  }
}

function handleMiss(note) {
  const laneW = W / state.lanes.length;
  const laneX = note.lane * laneW + laneW / 2;

  state.combo = 0;
  state.recentResults.push(false);
  spawnParticles(laneX, hitZoneY, '#ff2200', 6);
  spawnFeedback(laneX, hitZoneY - 40, 'החמצה', '#ff2200');
  Audio.playMiss();

  // Evaluate speed based on hit rate
  evaluateAndAdjustSpeed();

  updateHUD();
}

// ============================================================
// INPUT
// ============================================================
function laneForKey(key) {
  const k = key.toLowerCase();
  for (let i = 0; i < state.lanes.length; i++) {
    if (state.lanes[i].keys.includes(k)) return i;
  }
  return -1;
}

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (state.screen === 'playing' && !state.paused && state.countdownVal <= 0) {
    if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
      state.paused = true;
      showScreen('paused');
      return;
    }
    const lane = laneForKey(e.key);
    if (lane >= 0) {
      state.keysDown.add(lane);
      tryHitLane(lane);
    }
  } else if (state.screen === 'paused' && (e.key === 'Escape' || e.key === 'p' || e.key === 'P')) {
    state.paused = false;
    showScreen('playing');
  }
});

document.addEventListener('keyup', (e) => {
  const lane = laneForKey(e.key);
  if (lane >= 0) {
    state.keysDown.delete(lane);
    releaseLane(lane);
  }
});

// Mouse/touch on piano keys
function laneFromX(x) {
  const laneW = W / state.lanes.length;
  const idx = Math.floor(x / laneW);
  return Math.max(0, Math.min(state.lanes.length - 1, idx));
}

canvas.addEventListener('mousedown', (e) => {
  if (state.screen !== 'playing' || state.paused || state.countdownVal > 0) return;
  if (e.clientY >= H - pianoKeyH - 20) {
    const lane = laneFromX(e.clientX);
    state.keysDown.add(lane);
    tryHitLane(lane);
  }
});

canvas.addEventListener('mouseup', (e) => {
  const lane = laneFromX(e.clientX);
  state.keysDown.delete(lane);
  releaseLane(lane);
});

canvas.addEventListener('touchstart', (e) => {
  if (state.screen !== 'playing' || state.paused || state.countdownVal > 0) return;
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touch.clientY >= H - pianoKeyH - 20) {
      const lane = laneFromX(touch.clientX);
      state.keysDown.add(lane);
      tryHitLane(lane);
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  for (const touch of e.changedTouches) {
    const lane = laneFromX(touch.clientX);
    state.keysDown.delete(lane);
    releaseLane(lane);
  }
});

// ============================================================

// ============================================================
function showResults() {
  Audio.playLevelComplete();
  const pct = state.totalNotes > 0 ? state.hitNotes / state.totalNotes : 0;
  const stars = pct >= 0.9 ? 3 : pct >= 0.75 ? 2 : pct >= 0.5 ? 1 : 0;

  document.getElementById('results-score').textContent = state.score;

  const statsEl = document.getElementById('results-stats');
  statsEl.innerHTML = `
    <div>מושלם: ${state.perfectHits}</div>
    <div>פגיעות: ${state.hitNotes}</div>
    <div>החמצות: ${state.totalNotes - state.hitNotes}</div>
    <div>קומבו מקסימלי: ${state.maxCombo}</div>
    <div>דיוק: ${Math.round(pct * 100)}%</div>
  `;

  ['star1', 'star2', 'star3'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove('earned');
    if (i < stars) {
      setTimeout(() => el.classList.add('earned'), (i + 1) * 400);
    }
  });

  showScreen('results');
}

// ============================================================
// RENDERING
// ============================================================
let frameCount = 0;

function render() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient - warm dark theme inspired by the image
  const grad = ctx.createRadialGradient(W / 2, H * 0.6, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#1a0a05');
  grad.addColorStop(0.5, '#0f0505');
  grad.addColorStop(1, '#0a0008');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Twinkling stars with warm tones
  for (const s of state.stars) {
    const twinkle = Math.sin(frameCount * s.speed + s.phase) * 0.4 + 0.6;
    ctx.globalAlpha = twinkle * 0.5;
    // Mix warm and white stars
    ctx.fillStyle = s.phase > Math.PI ? '#ffd6a0' : '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (state.screen !== 'playing') return;

  const lanes = state.lanes;
  const numLanes = lanes.length;
  const laneW = W / numLanes;

  // Lane backgrounds with warm glow
  for (let i = 0; i < numLanes; i++) {
    // Base lane bg
    ctx.fillStyle = lanes[i].color;
    ctx.globalAlpha = 0.04;
    ctx.fillRect(i * laneW, 0, laneW, H);

    // Lane glow when key pressed or recently hit
    const glowTimer = state.laneGlowTimers[i] || 0;
    if (state.keysDown.has(i) || glowTimer > 0) {
      const glowStrength = state.keysDown.has(i) ? 0.15 : (glowTimer / 12) * 0.12;
      const laneGrad = ctx.createLinearGradient(i * laneW, hitZoneY - 200, i * laneW, hitZoneY + 50);
      laneGrad.addColorStop(0, 'transparent');
      laneGrad.addColorStop(0.5, lanes[i].color);
      laneGrad.addColorStop(1, lanes[i].glowColor);
      ctx.globalAlpha = glowStrength;
      ctx.fillStyle = laneGrad;
      ctx.fillRect(i * laneW, 0, laneW, H - pianoKeyH);
    }

    // Lane divider
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = lanes[i].color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(i * laneW, 0);
    ctx.lineTo(i * laneW, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Hit zone glow line - warm golden
  const glowAlpha = 0.4 + Math.sin(frameCount * 0.05) * 0.15;
  ctx.save();
  ctx.shadowColor = '#ff9800';
  ctx.shadowBlur = 25;
  ctx.globalAlpha = glowAlpha;
  ctx.strokeStyle = '#ffd200';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, hitZoneY);
  ctx.lineTo(W, hitZoneY);
  ctx.stroke();
  ctx.restore();

  // Draw falling notes (strips)
  for (const n of state.notes) {
    const lane = lanes[n.lane];
    const x = n.lane * laneW + 4;
    const w = laneW - 8;
    const color = lane.color;
    const glowColor = lane.glowColor;

    if (n.hit) {
      // Hit note: bright flash then fade
      const age = frameCount - (n.hitTime || frameCount);
      const fadeAlpha = Math.max(0, 0.6 - age * 0.04);
      if (fadeAlpha > 0) {
        ctx.globalAlpha = fadeAlpha;
        ctx.fillStyle = glowColor;
        roundRect(ctx, x, n.y, w, n.height, 8);
        ctx.fill();
        // Bright border
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        roundRect(ctx, x, n.y, w, n.height, 8);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } else {
      // Check if this strip is being pressed (highlight it)
      const isPressed = state.keysDown.has(n.lane);
      const stripOverlapsHitZone = n.y <= hitZoneY + 20 && n.y + n.height >= hitZoneY - 20;
      const highlight = isPressed && stripOverlapsHitZone;

      // Strip body with gradient
      const stripGrad = ctx.createLinearGradient(x, n.y, x, n.y + n.height);
      if (highlight) {
        stripGrad.addColorStop(0, glowColor);
        stripGrad.addColorStop(0.5, '#ffffff');
        stripGrad.addColorStop(1, glowColor);
      } else {
        stripGrad.addColorStop(0, color);
        stripGrad.addColorStop(1, glowColor);
      }

      ctx.globalAlpha = highlight ? 1 : 0.88;
      ctx.fillStyle = stripGrad;
      roundRect(ctx, x, n.y, w, n.height, 8);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Glow effect for strips near hit zone
      if (stripOverlapsHitZone) {
        ctx.save();
        ctx.shadowColor = color;
        ctx.shadowBlur = highlight ? 25 : 12;
        ctx.globalAlpha = highlight ? 0.8 : 0.4;
        ctx.fillStyle = color;
        roundRect(ctx, x, n.y, w, n.height, 8);
        ctx.fill();
        ctx.restore();
      }

      // Border
      ctx.strokeStyle = highlight ? '#ffffff' : 'rgba(255,255,255,0.5)';
      ctx.lineWidth = highlight ? 3 : 1.5;
      roundRect(ctx, x, n.y, w, n.height, 8);
      ctx.stroke();

      // Hebrew label
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${Math.min(18, laneW * 0.3)}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const labelY = Math.max(n.y + 14, Math.min(n.y + n.height / 2, hitZoneY));
      ctx.fillText(lane.hebrew, n.lane * laneW + laneW / 2, labelY);
    }
  }

  // Piano keys at bottom - warm theme
  for (let i = 0; i < numLanes; i++) {
    const lane = lanes[i];
    const x = i * laneW;
    const y = H - pianoKeyH;
    const pressed = state.keysDown.has(i);

    // Key background with warm gradient
    if (pressed) {
      const keyGrad = ctx.createLinearGradient(x, y, x, y + pianoKeyH);
      keyGrad.addColorStop(0, lane.glowColor);
      keyGrad.addColorStop(1, lane.color);
      ctx.fillStyle = keyGrad;
      ctx.globalAlpha = 1;

      // Glow above key when pressed
      ctx.save();
      ctx.shadowColor = lane.color;
      ctx.shadowBlur = 30;
      roundRect(ctx, x + 2, y + 2, laneW - 4, pianoKeyH - 4, 10);
      ctx.fill();
      ctx.restore();
    } else {
      ctx.fillStyle = '#1a0a08';
      ctx.globalAlpha = 0.92;
    }
    roundRect(ctx, x + 2, y + 2, laneW - 4, pianoKeyH - 4, 10);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Key border
    ctx.strokeStyle = lane.color;
    ctx.lineWidth = pressed ? 3 : 2;
    roundRect(ctx, x + 2, y + 2, laneW - 4, pianoKeyH - 4, 10);
    ctx.stroke();

    // Hebrew label
    ctx.fillStyle = pressed ? '#ffffff' : lane.color;
    ctx.font = `bold ${Math.min(22, laneW * 0.35)}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(lane.hebrew, x + laneW / 2, y + pianoKeyH / 2 - 10);

    // Keyboard shortcut
    ctx.fillStyle = pressed ? 'rgba(255,255,255,0.7)' : 'rgba(255,200,150,0.3)';
    ctx.font = `${Math.min(14, laneW * 0.2)}px 'Segoe UI', sans-serif`;
    ctx.fillText(lane.keys[0].toUpperCase(), x + laneW / 2, y + pianoKeyH / 2 + 14);
  }

  // Particles
  for (const p of state.particles) {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Feedback text
  for (const f of state.feedbacks) {
    ctx.globalAlpha = f.alpha;
    ctx.fillStyle = f.color;
    ctx.font = `bold ${Math.round(24 * f.scale)}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Slight shadow for readability
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 6;
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // Countdown
  if (state.countdownVal > 0) {
    ctx.fillStyle = '#ffd200';
    ctx.font = 'bold 120px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255, 210, 0, 0.6)';
    ctx.shadowBlur = 40;
    ctx.fillText(state.countdownVal, W / 2, H / 2);
    ctx.shadowBlur = 0;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// GAME LOOP
// ============================================================
let noteIdCounter = 0;

function update() {
  if (state.screen !== 'playing' || state.paused) return;

  // Countdown
  if (state.countdownVal > 0) {
    state.countdownTimer++;
    if (state.countdownTimer >= 60) {
      state.countdownTimer = 0;
      state.countdownVal--;
    }
    return;
  }

  // Decay lane glow timers
  for (const key in state.laneGlowTimers) {
    if (state.laneGlowTimers[key] > 0) {
      state.laneGlowTimers[key]--;
    }
  }

  const bpf = state.level === 1 ? BEATS_PER_FRAME_L1 : BEATS_PER_FRAME_L2;
  const adjustedBpf = bpf * (state.speed / state.baseSpeed);
  state.songBeat += adjustedBpf;

  // Spawn notes
  while (state.songNoteIdx < state.song.length) {
    const [lane, beat, dur] = state.song[state.songNoteIdx];
    if (beat <= state.songBeat) {
      let noteH;
      if (state.longStrips) {
        // Longer strips mode
        noteH = dur <= 1 ? SHORT_NOTE_HEIGHT * 2 : LONG_NOTE_BASE * 1.5 + (dur - 1) * LONG_NOTE_EXTRA * 1.5;
      } else {
        noteH = dur <= 1 ? SHORT_NOTE_HEIGHT : LONG_NOTE_BASE + (dur - 1) * LONG_NOTE_EXTRA;
      }
      state.notes.push({
        id: noteIdCounter++,
        lane,
        y: -noteH,
        height: noteH,
        duration: dur,
        hit: false,
        hitTime: 0,
      });
      state.songNoteIdx++;
    } else {
      break;
    }
  }

  // Move notes
  for (const n of state.notes) {
    n.y += state.speed;
  }

  // Check misses - miss when the TOP of the strip has passed well beyond the hit zone
  // (meaning the entire strip has gone through without being hit)
  for (const n of state.notes) {
    if (!n.hit && n.y > hitZoneY + GOOD_WINDOW + 20) {
      n.hit = true;
      n.hitTime = frameCount;
      handleMiss(n);
    }
  }

  // Remove off-screen notes
  state.notes = state.notes.filter(n => n.y < H + 50);

  // Update particles
  for (const p of state.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.alpha -= p.decay;
  }
  state.particles = state.particles.filter(p => p.alpha > 0);

  // Update feedbacks
  for (const f of state.feedbacks) {
    f.y -= 1.2;
    f.life--;
    if (f.life < 20) f.alpha -= 0.05;
    f.scale = Math.max(1, f.scale - 0.03);
  }
  state.feedbacks = state.feedbacks.filter(f => f.life > 0 && f.alpha > 0);

  // Check song complete
  if (state.songNoteIdx >= state.song.length && state.notes.length === 0 && !state.songDone) {
    state.songDone = true;
    setTimeout(() => showResults(), 500);
  }
}

function gameLoop() {
  frameCount++;
  update();
  render();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
